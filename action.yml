name: Guardrails Review
description: LLM-powered PR review with auto-approve and inline comments
inputs:
  pr-number:
    description: Pull request number
    required: true
  openrouter-key:
    description: OpenRouter API key
    required: true
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - run: pip install "${{ github.action_path }}"
      shell: bash
    - run: guardrails-review review --pr "${{ inputs.pr-number }}"
      shell: bash
      env:
        OPENROUTER_KEY: ${{ inputs.openrouter-key }}
        GH_TOKEN: ${{ github.token }}
