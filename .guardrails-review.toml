# Guardrails Review — LLM-powered PR reviewer
# SETUP: Set model below, add OPENROUTER_KEY to GitHub secrets.

[config]
model = "minimax/minimax-m2.5"

[review]
# max_diff_chars = 120000
agentic = true
max_iterations = 30

extra_instructions = """
Focus areas:
- Security: secrets, injection, unsafe operations
- Logic bugs and missing error handling
- Type safety and null checks
"""
