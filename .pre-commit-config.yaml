# =============================================================================
# AI Guardrails - Auto-Generated Pre-Commit Configuration
# =============================================================================
# Generated by: python -m guardrails.assemble
# Do not edit manually - regenerate with ai-guardrails init
# =============================================================================

fail_fast: true
default_language_version:
  python: python3.12
  node: 22.16.0
  rust: stable
repos:
- repo: local
  hooks:
  - id: format-and-stage
    name: format and stage
    entry: .ai-guardrails/hooks/format-and-stage.sh
    language: script
    always_run: true
    pass_filenames: false
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.0
  hooks:
  - id: gitleaks
    name: security - gitleaks detect secrets
- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
  - id: detect-secrets
    name: security - detect-secrets enhanced
    args:
    - --baseline
    - .secrets.baseline
    exclude: package-lock\.json|\.secrets\.baseline
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: detect-private-key
    name: security - detect private keys
- repo: https://github.com/semgrep/semgrep
  rev: v1.149.0
  hooks:
  - id: semgrep
    name: security - semgrep SAST scan
    args:
    - --config
    - auto
    - --error
    - --jobs
    - '1'
    exclude: ^tests/
- repo: local
  hooks:
  - id: detect-suppression-comments
    name: quality - no suppression comments
    entry: .ai-guardrails/hooks/detect-suppression-comments.sh
    language: script
    types_or:
    - python
    - javascript
    - jsx
    - ts
    - tsx
    - c
    - c++
    - c#
    - rust
    - go
    - shell
    - lua
- repo: local
  hooks:
  - id: validate-generated-configs
    name: quality - generated configs are fresh
    entry: .ai-guardrails/hooks/validate-generated-configs.sh
    language: script
    pass_filenames: false
    files: \.guardrails-exceptions\.toml$
- repo: local
  hooks:
  - id: detect-config-ignore-edits
    name: quality - no direct ignore-pattern edits
    entry: .ai-guardrails/hooks/detect-config-ignore-edits.sh
    language: script
    pass_filenames: false
    files: (pyproject\.toml|setup\.cfg|\.eslintrc|tsconfig\.json|\.flake8)$
- repo: https://github.com/compilerla/conventional-pre-commit
  rev: v4.3.0
  hooks:
  - id: conventional-pre-commit
    name: commit - conventional commit format
    stages:
    - commit-msg
    args:
    - feat
    - fix
    - docs
    - style
    - refactor
    - perf
    - test
    - build
    - ci
    - chore
    - revert
- repo: https://github.com/codespell-project/codespell
  rev: v2.4.1
  hooks:
  - id: codespell
    name: spelling - codespell typo check
    args:
    - --check-filenames
    exclude: ^(poetry\.lock|package-lock\.json|\.secrets\.baseline)$
- repo: https://github.com/DavidAnson/markdownlint-cli2
  rev: v0.20.0
  hooks:
  - id: markdownlint-cli2
    name: markdown - markdownlint
- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 0.36.0
  hooks:
  - id: check-github-workflows
    name: github - validate workflow files
  - id: check-github-actions
    name: github - validate action files
- repo: https://github.com/ComPWA/taplo-pre-commit
  rev: v0.9.3
  hooks:
  - id: taplo-format
    name: toml - taplo format check
    args:
    - --check
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
    name: format - trailing whitespace
    args:
    - --markdown-linebreak-ext=md
  - id: end-of-file-fixer
    name: format - end of file fixer
    exclude: ^\.github/workflows/claude.*\.yml$
  - id: mixed-line-ending
    name: format - mixed line endings
    args:
    - --fix=lf
  - id: check-yaml
    name: syntax - check yaml
    args:
    - --unsafe
  - id: check-json
    name: syntax - check json
  - id: check-toml
    name: syntax - check toml
  - id: check-xml
    name: syntax - check xml
  - id: check-merge-conflict
    name: git - check merge conflicts
  - id: check-added-large-files
    name: git - check large files
    args:
    - --maxkb=500
  - id: no-commit-to-branch
    name: git - no commit to main
    args:
    - --branch=main
    - --branch=master
  - id: check-case-conflict
    name: files - case conflict
  - id: check-symlinks
    name: files - broken symlinks
  - id: check-executables-have-shebangs
    name: files - executables have shebangs
  - id: check-shebang-scripts-are-executable
    name: files - shebang scripts executable
- repo: https://github.com/PyCQA/bandit
  rev: 1.9.3
  hooks:
  - id: bandit
    name: python - bandit security scan
    args:
    - -ll
    - -ii
    - -r
    exclude: ^tests/
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.14
  hooks:
  - id: ruff
    name: python - ruff lint (pedantic)
    args:
    - --no-fix
  - id: ruff-format
    name: python - ruff format
    args:
    - --check
- repo: https://github.com/jendrikseipp/vulture
  rev: v2.14
  hooks:
  - id: vulture
    name: python - vulture dead code
    args:
    - --min-confidence
    - '80'
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.19.1
  hooks:
  - id: mypy
    name: python - mypy type check (strict)
    args:
    - --strict
    - --warn-unreachable
    - --warn-redundant-casts
    - --warn-unused-ignores
    - --no-implicit-reexport
    - --disallow-untyped-decorators
    additional_dependencies: []
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-ast
    name: python - check ast syntax
  - id: debug-statements
    name: python - no debug statements
  - id: name-tests-test
    name: python - test files named test_*
    args:
    - --pytest-test-first

# pip-audit - CVE scanning for Python dependencies
- repo: https://github.com/pypa/pip-audit
  rev: v2.10.0
  hooks:
  - id: pip-audit
    name: "python - pip-audit CVE scan"
    args: ["--strict", "--progress-spinner", "off", "-r", "requirements-audit.txt"]
